title: VEP — Vix Enhancement Proposals
description: Vix 语言增强提案索引站
lang: zh-CN
timezone: Asia/Shanghai

url: "https://vixlang.github.io"
baseurl: "/VEP"

remote_theme: just-the-docs/just-the-docs

search_enabled: true
heading_anchors: true
color_scheme: light

plugins:
  - jekyll-feed

collections:
  veps:
    output: true
    permalink: /:collection/:name

defaults:
  - scope:
      path: ""
      type: "veps"
    values:
      layout: "vep"
  - scope:
      path: ""
    values:
      layout: "default"

